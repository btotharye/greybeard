name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  validate:
    name: Validate version matches tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version matches tag
        run: |
          VERSION=$(grep '__version__' greybeard/__init__.py | grep -oP '"\K[^"]+')
          TAG=${{ github.ref_name }}
          if [ "v$VERSION" != "$TAG" ]; then
            echo "❌ Error: Version in __init__.py ($VERSION) doesn't match tag ($TAG)"
            echo "Expected: v$VERSION"
            echo "Got: $TAG"
            exit 1
          fi
          echo "✅ Version validation passed: $VERSION"

  build:
    name: Build distribution
    needs: [validate]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv

      - name: Install build dependencies
        run: uv pip install build

      - name: Build package
        run: uv run --python 3.12 python -m build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/greybeard
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' # Only on manual trigger
    environment:
      name: testpypi
      url: https://test.pypi.org/p/greybeard
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
