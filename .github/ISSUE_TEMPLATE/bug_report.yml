name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure greybeard with...
        2. Run command...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages if applicable.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: LLM Backend
      description: Which backend were you using?
      options:
        - OpenAI
        - Anthropic
        - Ollama
        - LM Studio
        - Other
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      description: Which model were you using?
      placeholder: e.g., gpt-4o, claude-3-5-sonnet, llama3.2

  - type: textarea
    id: version
    attributes:
      label: Version Information
      description: Run `greybeard --version` and paste the output
      render: shell
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14.2, Ubuntu 22.04, Windows 11

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Paste your config (from `greybeard config show`). Redact API keys!
      render: yaml

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might help
