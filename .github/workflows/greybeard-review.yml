name: Greybeard Code Review

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  greybeard-review:
    name: Staff-Level Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false

    strategy:
      fail-fast: false
      matrix:
        pack: ["staff-core", "on-call", "security"]

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout base branch for diff
        run: |
          git fetch origin ${{ github.base_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install greybeard
        run: |
          uv tool install greybeard

      - name: Generate git diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          DIFF_SIZE=$(wc -c < /tmp/pr.diff)
          echo "size=$DIFF_SIZE" >> $GITHUB_OUTPUT

      - name: Analyze with Greybeard
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          REVIEW_OUTPUT=$(cat /tmp/pr.diff | greybeard analyze \
            --pack "${{ matrix.pack }}" \
            --mode review \
            --format markdown 2>&1)
          echo "$REVIEW_OUTPUT" > /tmp/review_${{ matrix.pack }}.md

      - name: Check for blocking issues
        id: risk-check
        env:
          RISK_THRESHOLD: ${{ vars.GREYBEARD_RISK_THRESHOLD || 'high' }}
        run: |
          REVIEW_FILE="/tmp/review_${{ matrix.pack }}.md"
          if [ "$RISK_THRESHOLD" = "high" ]; then
            BLOCK_PATTERNS="production incident|data loss|security vulnerability|cascading failure"
          elif [ "$RISK_THRESHOLD" = "medium" ]; then
            BLOCK_PATTERNS="production incident|data loss|security vulnerability|cascading failure|operational overhead"
          else
            BLOCK_PATTERNS="risk|concern|careful|consider"
          fi
          BLOCKING_FOUND=0
          if grep -iE "$BLOCK_PATTERNS" "$REVIEW_FILE" > /dev/null 2>&1; then
            BLOCKING_FOUND=1
          fi
          echo "blocking=$BLOCKING_FOUND" >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const pack = '${{ matrix.pack }}';
            const reviewFile = `/tmp/review_${pack}.md`;
            if (!fs.existsSync(reviewFile)) return;
            const reviewContent = fs.readFileSync(reviewFile, 'utf8');
            const blocking = '${{ steps.risk-check.outputs.blocking }}' === '1';
            const icons = {
              'staff-core': '🧙',
              'on-call': '📟',
              'security': '🔒'
            };
            const icon = icons[pack] || '📋';
            let truncated = reviewContent;
            if (truncated.length > 60000) {
              truncated = truncated.substring(0, 60000) + '\n\n... _(truncated)_';
            }
            const blockingBadge = blocking ? '⚠️ **BLOCKING ISSUES DETECTED**\n\n' : '';
            const comment = `${blockingBadge}## ${icon} Greybeard Review: ${pack}\n\n${truncated}\n\n---\n_Review generated by [Greybeard](https://github.com/btotharye/greybeard) on \`${{ github.sha }}\`_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existingComment = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(`Greybeard Review: ${pack}`)
            );
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Set PR status check
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const blocking = '${{ steps.risk-check.outputs.blocking }}' === '1';
            const pack = '${{ matrix.pack }}';
            const status = blocking ? 'failure' : 'success';
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: `Greybeard: ${pack}`,
              head_sha: context.sha,
              status: 'completed',
              conclusion: status,
              output: {
                title: `Staff Review (${pack})`,
                summary: blocking ? 'Blocking issues detected' : 'No blocking issues',
                text: `Greybeard analysis complete for ${pack} perspective.`
              }
            });
